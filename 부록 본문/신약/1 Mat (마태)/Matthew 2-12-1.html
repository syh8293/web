    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1, user-scalable=no">

        body {
            background-color: whitesmoke;

            line-height: 1.9;

            font-weight: 550;

    </style>

<body>
        <b>12-13절</b> 그들은 꿈에 헤롯에게 돌아가지 말라는 하나님의경고를
        받고 다른 길로 고국에 돌아가니라. 그들이 떠난 후, 보라, 주의
        천사가 꿈에 요셉에게 나타나 말하기를 “헤롯이 그 어린아이를
        찾아서 죽이려고 하니, 일어나 어린아이와 그의 모친을 데리고
        이집트로 피하여 내가 네게 말할 때까지 거기 있으라.”고 하더라.<br><br>

        <b>19절</b> 그러나 마리아는 이 모든 말을 마음속에 간직하고 되새겨 보더라.<br><br>

        <b>22절</b> 그후 모세의 율법에 따라 그녀의 정결례를 위한 날들이 차니,
        그들은 아기를 주께 드리기 위하여 예루살렘으로 데려왔더라.
</body>
