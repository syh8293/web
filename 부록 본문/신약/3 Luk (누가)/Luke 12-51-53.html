				<b>눅 12:51-53</b><br> 
				내가 땅 위에 화평을 주러 왔다고
				생각하느냐? 내가 너희에게 말하노니 아니라, 오히려 분쟁케 하러 왔노라.
				이제부터는 한 집에 다섯이 있으면 갈라져서 셋은 둘에 대적하고 둘은 셋에
				대적하리라. 아버지는 아들과 대적하고, 아들은 아버지와, 어머니는 딸과,
				딸은 어머니와, 시어머니는 며느리와, 며느리는 시어머니와 대적하여
				갈라지리라.”고 하시더라.
