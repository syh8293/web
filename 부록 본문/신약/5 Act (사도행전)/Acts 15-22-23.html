				<b>행 15:22-23</b><br> 
				그리하여 사도들과 장로들이 온 교회로 더불어 그들 가운데 
				사람들을 선정하여 바울과 바나바와 함께 안티옥으로 보내는 것을 좋게 여기니 
				곧 형제들 중에서 지도자인 바사바라 부르는 유다와 실라더라. 그들이 이렇게 
				그들 편에 써 보내기를 “사도들과 장로들과 형제들은 안티옥과 시리아와 킬리키아에 
				있는 이방인 형제들에게 문안하노라.
