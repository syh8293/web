        <b>렘 44:26</b> 그러므로 이집트 땅에 거하는 모든 유다야, 너희는 주의 
        말씀을 들으라. 보라, 주가 말하노라. 내가 내 위대한 이름으로 맹세하였으니 
        이집트 온 땅에서 유다의 어떤 사람의 입에서도 다시는 “주 하나님께서 살아 
        계시느니라.”고 말함으로 내 이름이 불려지지 아니하리라.
