        <b>렘 34:17</b> 그러므로 주가 이같이 말하노라. 너희가 각자 자기 형제와 각자 
        자기 이웃에게 자유를 선포함에 있어서 내게 경청하지 아니하였느니라. 주가 
        말하노라. 보라, 내가 너희로 인해 칼과 전염병과 기근을 향해 자유를 선포하며,
