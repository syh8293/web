        <b>렘 5:1-2</b> 너희는 예루살렘의 거리를 여기저기 달려서
        이제 보고 알며, 거기 넓은 곳에서 찾으라. 만일 너희가 한 사람이라도 찾을
        수 있다면, 공의를 행하고 진리를 구하는 누군가가 있다면, 내가 그 성읍을
        용서하리라. 그들이 말하기를 “주께서 살아 계시거니와” 할지라도 진실로
        그들은 거짓되이 맹세하는도다.
