        무엇을 보느냐?” 하시기에 내가 말씀드리기를 “무화과이온데 좋은 무화과는
        아주 좋고 나쁜 것은 아주 나빠서 먹을 수가 없으니 그것들이 너무
        나쁘나이다.” 하였더라.
