        <b>판 16:18</b> 데릴라가 삼손이 자기에게 그의 온 마음을 터놓은 것을 
        보고 보내어 필리스티아인의 군주들을 불러서 말하기를 “그가 그의 진심을
        내게 보여 주었으니 이제 한 번 올라오라.” 하였더니, 필리스티아인의
        군주들이 그녀에게 올라왔는데, 그들의 손에 돈을 가지고 왔더라.
