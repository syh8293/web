        <b>출 8:25-26</b><br> 
        그러자 파라오가 모세와 아론을 불러 말하기를
        “너희는 가서 이 땅에서 너희 하나님께 희생제를 드리라.” 하니 모세가
        말하기를 “그렇게 하는 것이 합당치 아니하니, 이는 우리가 이집트인들이
        가증히 여기는 것을 주 우리 하나님께 드릴 것이기 때문이니이다. 보소서,
        우리가 이집트인들의 가증히 여기는 것을 그들의 목전에서 희생제로 드리면
        그들이 우리를 돌로 치지 않으리이까?
