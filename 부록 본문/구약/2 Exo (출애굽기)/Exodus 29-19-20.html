				<b>출 29:19-20</b><br> 
				너는 다른 숫양을 취하고 아론과 그의 아들들은 그
				숫양의 머리에 안수할지니라. 그리하여 너는 그 숫양을 잡고 그 
				피를 취하여 아론의 오른쪽 귀 끝과 그의 아들들의 오른쪽 귀 끝에 
				바르고 또 그들의 오른손 엄지 손가락과 오른발 엄지 발가락 위에 
				바르고 피를 제단 주위에 뿌릴지니라.
