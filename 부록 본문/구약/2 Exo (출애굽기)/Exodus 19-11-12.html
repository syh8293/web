        <b>출 19:11-12</b><br> 
        셋째 날을 대비하라. 이는 셋째 날에 주가 온
        백성의 목전에서 시내 산 위에 내려갈 것임이라. 너는 백성 주위에
        범위를 설정하고 말하기를 ‘너희는 스스로 조심하여 산에 오르지 않도록
        하고 또한 그 경계에 닿지 말지니, 산에 닿는 자는 누구라도 반드시
        죽임을 당하리라.
