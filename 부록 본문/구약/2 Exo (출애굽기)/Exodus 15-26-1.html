				<b>출 15:26</b> 말씀하시기를 “네가 주 너의 하나님의 음성에 부지런히 
				경청하고, 그가 보시기에 옳은 것을 행하며, 그의 계명들에 귀기울이고, 
				그의 모든 규례들을 지키면, 내가 이집트인들에게 가져왔던 그 질병들의 
				하나도 너에게 내리지 아니하리라. 이는 내가 너를 치유하는 주이기 때문이라.” 
				하시더라.
