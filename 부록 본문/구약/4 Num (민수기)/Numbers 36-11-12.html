				<b>민 36:11-12</b><br> 
				슬로프핫의 딸 말라와 티르사와 호글라와 밀카와 노아가 그들의 
				아비의 형제의 아들들과 혼인하되, 그들이 요셉의 아들인 므낫세의 아들들의 족속들에게 
				혼인하였으므로, 그들의 유업이 그들 조상의 족속의 지파에 남아 있었더라.
