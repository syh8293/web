        <b>민 10:14-17</b><br> 
				선발대로 유다 자손 진영의 깃발이 그들의 군대대로
        나아갔고 그의 군대의 지휘는 암미나답의 아들 나손이 맡았더라. 잇사칼 자손
        지파의 군대 지휘는 수알의 아들 느다니엘이 맡았고 스불룬 자손 지파의 군대
        지휘는 헬론의 아들 엘리압이 맡았더라. 성막을 걷으니, 게르손의 아들들과
        므라리의 아들들이 성막을 메고 나아갔더라.
