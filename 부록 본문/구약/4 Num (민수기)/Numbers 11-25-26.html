        <b>민 11:25-26</b><br> 
				주께서 구름 가운데 내려오셔서 그에게 말씀하시고 그 
        위에 있던 영을 취하여 칠십 장로들에게 주시니라. 그 영이 그들 위에 머무니, 
				그들이 예언하고 멈추지 않더라. 진영에는 두 사람이 남아 있었는데, 한 
				사람의 이름은 엘닷이요, 한 사람의 이름은 메닷이라. 그들은 기록된 자들 
				중에 있었는데 성막에 나아가지 아니하였으나 영이 그들 위에 머물렀더니 
				그들이 진영 안에서 예언하였더라.
