        <b>민 10:18-20</b><br> 
				그 다음으로 르우벤 진영의 깃발이 그들의 군대대로
        진행하고 그의 군대의 지휘는 스데울의 아들 엘리술이 맡았더라. 시므온 자손
        지파의 군대 지휘는 수리삿대의 아들 슬루미엘이 맡았으며 갓 자손 지파의 군대
        지휘는 드우엘의 아들 엘리아삽이 맡았더라.
