<body>
				<b>왕상 19:5-8</b> 그리고 그가 향나무 아래서 누워 잠들었는데,
				보라, 한 천사가 그를 만지며 그에게 말하기를 “일어나 먹으라.” 하는지라.
				그가 보니, 보라, 그의 머리맡에 숯불에 구운 과자와 물 한 병이 있더라.
				그가 먹고 마신 후 다시 누우니 주의 천사가 두 번째로 다시 와서 그를
				만지며 말하기를 “일어나 먹으라. 갈 길이 네게 너무 크니라.” 하더라.
				그가 일어나 먹고 마시고 그 음식의 힘으로 사십 일 밤낮을 가서 하나님의 산
				호렙에 이르렀더라.
