			  <b>신 21:19-21</b><br> 
        그때는 그의 아비와 그의 어미가 그를 잡아다가 자기 고장의 
        성문으로 그의 성읍의 장로들에게 데려가서 그의 성읍의 장로들에게 말하기를 “우리 
        아들은 고집세고 반항적이라 우리의 음성에 순종하지 아니하니 그는 탐식하는 자요, 
        주정뱅이니이다.” 할 것이며 그러면 그의 성읍의 모든 사람들은 그를 돌로 쳐 
        죽일지니 그리하여 너는 너희 가운데서 악을 제거하라. 그러면 모든 이스라엘이 듣고 
        두려워하리라.
