				<b>시 118:22-25</b> 건축자들이 버린 돌이 모퉁이의 머릿돌이
				되었나니 이는 주께서 행하신 것이요, 우리 눈에 놀라운 것이로다. 이 날은
				주께서 정하신 날이라. 이 날에 우리가 즐거워하고 기뻐하리로다. 오 주여,
				내가 주께 간구하오니 지금 구원하소서. 오 주여, 내가 주께 간구하오니 지금
