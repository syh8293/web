				<b>대상 29:2</b> 이제 내가 내 하나님의 전을 위하여 내 힘을 다하여 
				준비하였으니 금으로 만들어야 할 것을 위한 금과, 은으로 만들어야 할
				것을 위한 은과, 놋으로 만들어야 할 것을 위한 놋과, 철로 만들어야 할
				것을 위한 철과, 나무로 만들어야 할 것을 위한 나무이며, 얼룩마노와 박을
				보석들과 반짝이는 보석들과 여러 가지 색상의 보석들과 여러 가지 진귀한
				보석들과 대리석이 풍부하도다.
