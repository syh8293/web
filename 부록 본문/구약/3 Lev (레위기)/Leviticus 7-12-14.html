        <b>레 7:12-14</b><br> 
        만일 그가 감사함으로 그것을 드리려면 그는 기름에 섞은 누룩
        없는 과자와 기름 바른 누룩 없는 전병과 고운 가루에 기름을 섞어 튀긴
        과자를 감사의 희생제물과 함께 드릴지니라. 과자 외에도 그는 자기 제사를
        위하여 누룩 있는 빵을 그의 화목제의 감사의 희생제물과 함께 드릴지니라.
        그는 그 전체 헌물 중에서 하나씩 주께 들어올리는 제사로 드리고 그것은
        화목제물의 피를 뿌린 제사장의 것이 될지니라.
