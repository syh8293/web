<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>한글 킹제임스 성경</title>
  <style>
    /* 기본 설정: 화면 전체를 꽉 채우고 스크롤 방지 */
body {
    margin: 0;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    font-family: sans-serif;
    background-color: #2c3e50;
}

/* 1단: 헤더 (노치 대응 + 세로 쌓기) */
#app-header {
    padding-top: env(safe-area-inset-top, 20px); /* 아이폰 노치만큼 띄우기 */
    background-color: #2c3e50;
    color: white;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding-bottom: 10px;
    z-index: 100;
}

/* 성경 선택 줄 */
.selection-line {
    display: flex;
    justify-content: space-around;
    padding: 0 10px;
    gap: 5px;
}

.selection-line select {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    font-size: 15px;
}

.btn-go {
    background-color: #7f8c8d;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    font-weight: bold;
}

/* 2단: 재생 컨트롤 (유튜브 스타일) */
.tts-controls {
    display: flex;
    justify-content: center;
    gap: 15px;
    padding: 5px 10px;
}

.btn-main {
    background-color: #e74c3c;
    color: white;
    border: none;
    padding: 12px 25px;
    border-radius: 25px; /* 둥근 버튼 */
    font-size: 16px;
    font-weight: bold;
    flex: 1;
    max-width: 150px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.2);
}

.btn-stop {
    background-color: #555;
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 25px;
    font-size: 14px;
}

/* 상태 표시줄: 겹치지 않게 독립된 공간 확보 */
#status-display {
    background-color: #34495e;
    text-align: center;
    padding: 5px;
    font-size: 13px;
    color: #2ecc71;
    min-height: 20px;
}

/* 3단: 성경 본문 (나머지 공간 전부 차지) */
#bible-frame {
    flex: 1;
    width: 100%;
    border: none;
    background-color: white;
}

/* iframe 내부의 하이라이트 스타일 (자바스크립트로 주입하거나 iframe 로드시 적용) */
.highlight {
    background-color: yellow !important;
    color: black !important;
    font-weight: bold;
    border-radius: 4px;
    transition: background-color 0.2s;
}
  </style>

  <style>
    /* 컨트롤러 전체 박스 */
    .tts-controls {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        padding: 10px;
        background: #34495e; /* 헤더보다 살짝 밝은 네이비 */
        border-radius: 12px;
        margin: 5px 10px;
    }

    /* 공통 버튼 스타일 */
    .tts-controls button {
        border: none;
        border-radius: 8px;
        padding: 12px 18px;
        font-size: 14px;
        font-weight: bold;
        color: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 5px;
        transition: transform 0.1s, background 0.2s;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .tts-controls button:active { transform: scale(0.95); }

    /* 현재 읽기 상태 표시창 */
    #status-display {
        width: 100%;
        text-align: center;
        font-size: 13px;
        color: #ecf0f1;
        margin-top: 5px;
        font-style: italic;
    }

    /* iframe 내부의 하이라이트 스타일 (자바스크립트로 주입하거나 iframe 로드시 적용) */
.highlight {

const bookSelect = document.getElementById('book-select');
const chapterSelect = document.getElementById('chapter-select');
const frame = document.getElementById('bible-frame');

// 초기화: 성경 목록 채우기
function init() {
    for (let key in bibleData) {
        let opt = document.createElement('option');
        opt.value = key;
        opt.innerText = bibleData[key].name;
        bookSelect.appendChild(opt);
    }
    updateChapters();
}

// 장 목록 업데이트 (0장부터)
function updateChapters() {
    const book = bibleData[bookSelect.value];
    chapterSelect.innerHTML = "";
    for (let i = 0; i <= book.chapters; i++) {
        let opt = document.createElement('option');
        opt.value = i;
        opt.innerText = i + "장";
        chapterSelect.appendChild(opt);
    }
}

// 성경 파일 로드
function loadBible() {
    const book = bibleData[bookSelect.value];
    const chapter = chapterSelect.value;
    const path = `${book.folder}/${chapter}.html`;
    frame.src = path;
}

// TTS & 하이라이트 제어
function speakBible() {
    window.speechSynthesis.cancel();
    const frameDoc = frame.contentWindow.document;
    prepareHighlight(frameDoc);

    // TTS용 클린 텍스트 추출 (헤더, h5 등 제외)
    const tempDiv = frameDoc.body.cloneNode(true);
    const junk = tempDiv.querySelectorAll('header, h5, sup, a, b, script, style, button');
    junk.forEach(j => j.remove());
    
    let cleanText = tempDiv.innerText
        .replace(/\d+:\d+/g, "") // 절 번호 제거
        .replace(/\. /g, ".  ")  // 마침표 뒤 휴지기
        .trim();

    const utterance = new SpeechSynthesisUtterance(cleanText);
    utterance.lang = 'ko-KR';
    utterance.rate = 0.8; // 대장님이 요청하신 여유로운 속도

    utterance.onboundary = (event) => {
        if (event.name === 'word') {
            highlightWord(frameDoc, event.charIndex);
        }
    };

    window.speechSynthesis.speak(utterance);
}

// 하이라이트 그릇 만들기 (절 단위 통합)
function prepareHighlight(doc) {
    const body = doc.body;
    if (!doc.getElementById('tts-style')) {
        const style = doc.createElement('style');
        style.id = 'tts-style';
        style.innerHTML = `
            .highlight-verse { background-color: #FFF59D !important; border-radius: 4px; transition: background-color 0.2s; }
            .verse-container { display: inline; }
            .verse-num { background-color: transparent !important; color: #888; font-weight: normal; }
        `;
        doc.head.appendChild(style);
    }
    if (body.querySelector('.verse-container')) return;

    const walker = doc.createTreeWalker(body, NodeFilter.SHOW_TEXT, null, false);
    let node;
    let globalIndex = 0;
    const nodes = [];
    while(node = walker.nextNode()) nodes.push(node);

    nodes.forEach(node => {
        const parent = node.parentNode;
        if (['header', 'h5', 'script', 'style'].includes(parent.tagName.toLowerCase())) return;

        const text = node.nodeValue;
        const match = text.match(/^(\s*\d+:\d*\s*)(.*)/);

        if (match) {
            const container = doc.createElement('span');
            container.className = 'verse-container';
            container.dataset.start = globalIndex;
            
            const numSpan = doc.createElement('span');
            numSpan.className = 'verse-num';
            numSpan.textContent = match[1];
            
            const contentText = doc.createTextNode(match[2]);
            container.appendChild(numSpan);
            container.appendChild(contentText);
            node.parentNode.replaceChild(container, node);
            
            globalIndex += match[2].length;
            container.dataset.end = globalIndex;
        } else {
            // 태그 내부 텍스트(b, a, sup 등)를 현재 절 컨테이너에 귀속
            let p = node.parentNode;
            while(p && p !== body) {
                if(p.classList.contains('verse-container')) {
                    globalIndex += text.length;
                    p.dataset.end = globalIndex;
                    break;
                }
                p = p.parentNode;
            }
        }
    });
}

// 하이라이트 매칭 및 자동 스크롤
function highlightWord(doc, charIndex) {
    const containers = doc.querySelectorAll('.verse-container');
    let activeContainer = null;

    for (let c of containers) {
        const start = parseInt(c.dataset.start);
        const end = parseInt(c.dataset.end);
        if (charIndex >= start && charIndex <= end) {
            activeContainer = c;
            break;
        }
    }

    if (activeContainer && !activeContainer.classList.contains('highlight-verse')) {
        doc.querySelectorAll('.highlight-verse').forEach(el => el.classList.remove('highlight-verse'));
        activeContainer.classList.add('highlight-verse');
        activeContainer.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
}

// 시작
init();
</script>
