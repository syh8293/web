
 <!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>한글 킹제임스 성경</title>
  <style>
    /* 기본 설정: 화면 전체를 꽉 채우고 스크롤 방지 */
body {
    margin: 0;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    font-family: sans-serif;
    background-color: #2c3e50;
}

/* 1단: 헤더 (노치 대응 + 세로 쌓기) */
#app-header {
    padding-top: env(safe-area-inset-top, 20px); /* 아이폰 노치만큼 띄우기 */
    background-color: #2c3e50;
    color: white;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding-bottom: 10px;
    z-index: 100;
}

/* 성경 선택 줄 */
.selection-line {
    display: flex;
    justify-content: space-around;
    padding: 0 10px;
    gap: 5px;
}

.selection-line select {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    font-size: 15px;
}

.btn-go {
    background-color: #7f8c8d;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    font-weight: bold;
}

/* 2단: 재생 컨트롤 (유튜브 스타일) */
.tts-controls {
    display: flex;
    justify-content: center;
    gap: 15px;
    padding: 5px 10px;
}

.btn-main {
    background-color: #e74c3c;
    color: white;
    border: none;
    padding: 12px 25px;
    border-radius: 25px; /* 둥근 버튼 */
    font-size: 16px;
    font-weight: bold;
    flex: 1;
    max-width: 150px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.2);
}

.btn-stop {
    background-color: #555;
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 25px;
    font-size: 14px;
}

/* 상태 표시줄: 겹치지 않게 독립된 공간 확보 */
#status-display {
    background-color: #34495e;
    text-align: center;
    padding: 5px;
    font-size: 13px;
    color: #2ecc71;
    min-height: 20px;
}

/* 3단: 성경 본문 (나머지 공간 전부 차지) */
#bible-frame {
    flex: 1;
    width: 100%;
    border: none;
    background-color: white;
}

/* iframe 내부의 하이라이트 스타일 (자바스크립트로 주입하거나 iframe 로드시 적용) */
.highlight {
    background-color: yellow !important;
    color: black !important;
    font-weight: bold;
    border-radius: 4px;
    transition: background-color 0.2s;
}
  </style>

  <style>
    /* 컨트롤러 전체 박스 */
    .tts-controls {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        padding: 10px;
        background: #34495e; /* 헤더보다 살짝 밝은 네이비 */
        border-radius: 12px;
        margin: 5px 10px;
    }

    /* 공통 버튼 스타일 */
    .tts-controls button {
        border: none;
        border-radius: 8px;
        padding: 12px 18px;
        font-size: 14px;
        font-weight: bold;
        color: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 5px;
        transition: transform 0.1s, background 0.2s;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .tts-controls button:active { transform: scale(0.95); }

    /* 현재 읽기 상태 표시창 */
    #status-display {
        width: 100%;
        text-align: center;
        font-size: 13px;
        color: #ecf0f1;
        margin-top: 5px;
        font-style: italic;
    }

    /* iframe 내부의 하이라이트 스타일 (자바스크립트로 주입하거나 iframe 로드시 적용) */
.highlight {
    background-color: yellow !important;
    color: black !important;
    font-weight: bold;
    border-radius: 4px;
    transition: background-color 0.2s;
}
  </style>

</head>

<body>
    <div id="app-header">
        <div class="selection-line">
            <select id="book-select" onchange="updateChapters()"></select>
            <select id="chapter-select"></select>
            <button class="btn-go" onclick="loadBible()">이동</button>
        </div>

        <div class="tts-controls">
            <button id="main-play-btn" class="btn-main" onclick="togglePlay()">▶ 시작</button>
            <button class="btn-stop" onclick="stopBible()">■ 정지</button>
        </div>

        <div id="status-display">말씀을 선택해 주세요</div>
    </div>

    <iframe id="bible-frame" src=""></iframe>

<script>

    "Lamentations": { name: "예레미야 애가", folder: "25 Lamentations (애가)", chapters: 5 },
    "Ezekiel": { name: "에스겔", folder: "26 Ezekiel (에스겔)", chapters: 48 },
    "Daniel": { name: "다니엘", folder: "27 Daniel (다니엘)", chapters: 12 },
    "Hosea": { name: "호세아", folder: "28 Hosea (호세아)", chapters: 14 },

    "Obadiah": { name: "오바댜", folder: "31 Obadiah (오바댜)", chapters: 1 },

    "Habakkuk": { name: "하박국", folder: "35 Habakkuk (하박국)", chapters: 3 },
    "Zephaniah": { name: "스바냐", folder: "36 Zephaniah (스파냐)", chapters: 3 },
    "Haggai": { name: "학개", folder: "37 Haggai (학개)", chapters: 2 },
    "Zechariah": { name: "스가랴", folder: "38 Zechariah (스카랴)", chapters: 14 },
    "Malachi": { name: "말라기", folder: "39 Malachi (말라키)", chapters: 4 },
    "Matthew": { name: "마태복음", folder: "1 Matthew (마태복음)", chapters: 28 },
    "Mark": { name: "마가복음", folder: "2 Mark (마가복음)", chapters: 16 },
    "Luke": { name: "누가복음", folder: "3 Luke (누가복음)", chapters: 24 },
    "John": { name: "요한복음", folder: "4 John (요한복음)", chapters: 21 },
    "Acts": { name: "사도행전", folder: "5 Acts (사도행전)", chapters: 28 },
    "Romans": { name: "로마서", folder: "6 Romans (로마서)", chapters: 16 },

    "2Corinthians": { name: "고린도후서", folder: "8 2 Corinthians (고린도후서)", chapters: 13 },
    "Galatians": { name: "갈라디아서", folder: "9 Galatians (갈라디아서)", chapters: 6 },
    "Ephesians": { name: "에베소서", folder: "10 Ephesians (에베소서)", chapters: 6 },
    "Philippians": { name: "빌립보서", folder: "11 Philippians (빌립보서)", chapters: 4 },
    "Colossians": { name: "골로새서", folder: "12 Colossians (골로새서)", chapters: 4 },
    "1Thessalonians": { name: "데살로니가전서", folder: "13 1 Thessalonians (데살로니가전서)", chapters: 5 },
    "2Thessalonians": { name: "데살로니가후서", folder: "14 2 Thessalonians (데살로니가후서)", chapters: 3 },
    "1Timothy": { name: "디모데전서", folder: "15 1 Timothy (디모데전서)", chapters: 6 },
    "2Timothy": { name: "디모데후서", folder: "16 2 Timothy (디모데후서)", chapters: 4 },
    "Titus": { name: "디도서", folder: "17 Titus (디도서)", chapters: 3 },
    "Philemon": { name: "빌레몬서", folder: "18 Philemon (빌레몬서)", chapters: 1 },
    "Hebrews": { name: "히브리서", folder: "19 Hebrews (히브리서)", chapters: 13 },
    "James": { name: "야고보서", folder: "20 James (야고보서)", chapters: 5 },
    "1Peter": { name: "베드로전서", folder: "21 1 Peter (베드로전서)", chapters: 5 },
    "2Peter": { name: "베드로후서", folder: "22 2 Peter (베드로후서)", chapters: 3 },
    "1John": { name: "요한1서", folder: "23 1 John (요한1서)", chapters: 5 },
    "2John": { name: "요한2서", folder: "24 2 John (요한이서)", chapters: 1 },
    "3John": { name: "요한3서", folder: "25 3 John (요한삼서)", chapters: 1 },
    "Jude": { name: "유다서", folder: "26 Jude (유다서)", chapters: 1 },
    "Revelation": { name: "요한계시록", folder: "27 Revelation (요한계시록)", chapters: 22 }
};

const bookSelect = document.getElementById('book-select');
const chapterSelect = document.getElementById('chapter-select');
const frame = document.getElementById('bible-frame');
let isSpeaking = false;

// [과거 기억 2] 0장부터 시작하는 장 선택 로직
function init() {
    for (let key in bibleData) {
        let opt = document.createElement('option');
        opt.value = key;
        opt.innerText = bibleData[key].name;
        bookSelect.appendChild(opt);
    }
    updateChapters();
}

function updateChapters() {
    const book = bibleData[bookSelect.value];
    chapterSelect.innerHTML = "";
    for (let i = 0; i <= book.chapters; i++) {
        let opt = document.createElement('option');
        opt.value = i;
        opt.innerText = (i === 0) ? "개요(0장)" : i + "장";
        chapterSelect.appendChild(opt);
    }
    loadBible();
}

function loadBible() {
    const book = bibleData[bookSelect.value];
    const path = `${book.folder}/${chapterSelect.value}.html`;
    frame.src = path;
    stopSpeak(); // 새로운 장 로드 시 TTS 중단
}

// [과거 기억 3] TTS 최적화 (헤더 무시, 일시정지 지원, 부드러운 하이라이트)
function toggleSpeak() {
    if (window.speechSynthesis.speaking) {
        if (window.speechSynthesis.paused) window.speechSynthesis.resume();
        else window.speechSynthesis.pause();
    } else {
        startSpeak();
    }
}

function startSpeak() {
    window.speechSynthesis.cancel();
    const frameDoc = frame.contentWindow.document;
    
    // 하이라이트 주머니 만들기 (절 단위 통합 & 태그 무시)
    prepareHighlight(frameDoc);

    const tempDiv = frameDoc.body.cloneNode(true);
    // [과거 기억 4] header, h5, sup 등 절대 읽지 않도록 제거
    tempDiv.querySelectorAll('header, h5, sup, script, style, a, b').forEach(el => el.remove());
    
    let textToRead = tempDiv.innerText
        .replace(/\d+:\d+/g, "") // 절 번호 무시
        .replace(/(\d+)\s*장/g, "$1 장") // '일 장'으로 자연스럽게 읽기
        .trim();

    const utterance = new SpeechSynthesisUtterance(textToRead);
    utterance.lang = 'ko-KR';
    utterance.rate = 0.8; // 대장님의 여유로운 속도

    utterance.onboundary = (event) => {
        if (event.name === 'word') highlightVerse(frameDoc, event.charIndex);
    };

    utterance.onend = () => { isSpeaking = false; };
    window.speechSynthesis.speak(utterance);
    isSpeaking = true;
}

function stopSpeak() {
    window.speechSynthesis.cancel();
    isSpeaking = false;
}

// [과거 기억 5] 하이라이트 '통합 주머니' 및 '절 번호 보호'
function prepareHighlight(doc) {
    const body = doc.body;
    if (!doc.getElementById('tts-style')) {
        const style = doc.createElement('style');
        style.id = 'tts-style';
        style.innerHTML = `
            .v-container { display: inline; transition: 0.3s; padding: 2px 0; }
            .v-num { background: transparent !important; color: #888; font-weight: normal; }
            .highlight-active { background: #FFF59D !important; border-radius: 4px; box-shadow: 0 0 5px #FFF59D; }
        `;
        doc.head.appendChild(style);
    }
    if (body.querySelector('.v-container')) return;

    const walker = doc.createTreeWalker(body, NodeFilter.SHOW_TEXT, null, false);
    let node;
    let index = 0;
    const nodes = [];
    while(node = walker.nextNode()) nodes.push(node);

    nodes.forEach(n => {
        const parent = n.parentNode;
        if (['header', 'h5', 'script', 'style'].includes(parent.tagName.toLowerCase())) return;

        const match = n.nodeValue.match(/^(\s*\d+:\d*\s*)(.*)/);
        if (match) {
            const span = doc.createElement('span');
            span.className = 'v-container';
            span.dataset.start = index;
            
            const num = doc.createElement('span');
            num.className = 'v-num';
            num.textContent = match[1];
            
            const content = doc.createTextNode(match[2]);
            span.appendChild(num);
            span.appendChild(content);
            n.parentNode.replaceChild(span, n);
            index += match[2].length;
            span.dataset.end = index;
        } else {
            let p = n.parentNode;
            while(p && p !== body) {
                if(p.classList.contains('v-container')) {
                    index += n.nodeValue.length;
                    p.dataset.end = index;
                    break;
                }
                p = p.parentNode;
            }
        }
    });
}

function highlightVerse(doc, charIndex) {
    const containers = doc.querySelectorAll('.v-container');
    containers.forEach(c => {
        const start = parseInt(c.dataset.start);
        const end = parseInt(c.dataset.end);
        if (charIndex >= start && charIndex <= end) {
            if (!c.classList.contains('highlight-active')) {
                doc.querySelectorAll('.highlight-active').forEach(el => el.classList.remove('highlight-active'));
                c.classList.add('highlight-active');
                // [과거 기억 6] 아이폰에서도 부드러운 스크롤 중앙 정렬
                c.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }
    });
}

window.onload = init;
</script>
