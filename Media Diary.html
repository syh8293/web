<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미디어 다이어리</title>
    <style>
        /* 모바일 우선 스타일 */
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #f5f5f5; }
        .calendar-container { background: #fff; border-radius: 10px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .day { padding: 10px; border: 1px solid #eee; border-radius: 5px; cursor: pointer; }
        .day:active { background: #e0f7fa; }
        
        /* 기록 모달/영역 */
        .record-section { margin-top: 20px; display: none; background: #fff; padding: 15px; border-radius: 10px; }
        .preview img, .preview video { max-width: 100%; margin-top: 10px; border-radius: 5px; }
        textarea { width: 100%; height: 80px; margin-top: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="calendar-container">
    <h3 id="monthTitle">2026년 4월</h3>
    <div class="days" id="calendarDays">
        </div>
</div>

<div id="recordSection" class="record-section">
    <h4 id="selectedDate">0000-00-00 기록</h4>
    <input type="file" id="mediaInput" accept="image/*, video/*">
    <div id="preview" class="preview"></div>
    <textarea placeholder="오늘의 이야기를 남겨보세요..."></textarea>
    <button onclick="saveRecord()">저장하기</button>
</div>

<script>
    // 간단한 날짜 표시 로직
    const calendar = document.getElementById('calendarDays');
    for(let i=1; i<=30; i++) {
        const dayDiv = document.createElement('div');
        dayDiv.className = 'day';
        dayDiv.innerText = i;
        dayDiv.onclick = () => showRecord(i);
        calendar.appendChild(dayDiv);
    }

    function showRecord(day) {
        document.getElementById('selectedDate').innerText = `4월 ${day}일 기록`;
        document.getElementById('recordSection').style.display = 'block';
    }

    // 파일 업로드 시 미리보기 기능 등 추가 구현 가능
</script>

</body>
</html>
