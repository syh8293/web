  <meta charset="UTF-8">

    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>한글 킹제임스 성경</title>
  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
    }

    /* 상단 고정 메뉴 */
    #app-header {
      height: 110px;
      background: #343a40;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
      z-index: 100;
    }

    .controls {
      display: flex;
      gap: 5px;
      margin-bottom: 10px;
    }

    select,
    button {
      padding: 8px;
      border-radius: 5px;
      border: none;
      font-size: 14px;
    }

    button {
      background: #495057;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .tts-controls {
      display: flex;
      gap: 10px;
    }

    .btn-play {
      background: #28a745;
    }

    .btn-stop {
      background: #dc3545;
    }

    /* 성경 본문이 나오는 창 */
    #bible-frame {
      width: 100%;
      height: calc(100% - 110px);
      border: none;
    }
  </style>

      <select id="book-select"
        onchange="updateChapters()"></select>
      <select id="chapter-select"></select>
      <button onclick="loadBible()">바로가기</button>
    </div>
    <div class="tts-controls">      
      <button class="btn-play"
        onclick="speakBible()">▶️ 읽기</button>
      <button class="btn-stop"
        onclick="stopBible()">■ 정지</button>
    </div>

      "Hebrews": { name: "히브리서", type: "신약", folder: "19 Hebrews (히브리서)", chapters: 13 },
      "James": { name: "야고보서", type: "신약", folder: "20 James (야고보서)", chapters: 5 },
      "Peter1": { name: "베드로전서", type: "신약", folder: "21 Peter 1 (베드로전서)", chapters: 5 },
      "Peter2": { name: "베드로후서", type: "신약", folder: "22 Peter 2 (베드로후서)", chapters: 3 },
      "John1": { name: "요한 1서", type: "신약", folder: "23 John 1 (요한 1서)", chapters: 5 },
      "John2": { name: "요한이서", type: "신약", folder: "24 John2 (요한이서)", chapters: 1 },
      "John3": { name: "요한삼서", type: "신약", folder: "25 John3 (요한삼서)", chapters: 1 },
      "Jude": { name: "유다서", type: "신약", folder: "26 Jude (유다서)", chapters: 1 },
      "Revelation": { name: "요한계시록", type: "신약", folder: "27 Revelation (요한계시록)", chapters: 22 }
  };

  const bookSelect = document.getElementById('book-select');
  const chapterSelect = document.getElementById('chapter-select');
  const frame = document.getElementById('bible-frame');
  let isPaused = false;
  let autoNext = true; // 자동으로 다음 장 넘기기 활성화

  function toSinoKorean(num) {
      const units = ["", "일", "이", "삼", "사", "오", "육", "칠", "팔", "구"];
      const tens = ["", "십", "백"]; 
      let n = parseInt(num);
      if (n === 0) return "영";
      let result = "";
      if (n >= 100) { result += (Math.floor(n / 100) === 1 ? "" : units[Math.floor(n / 100)]) + "백"; n %= 100; }
      if (n >= 10) { let d = Math.floor(n / 10); result += (d === 1 ? "" : units[d]) + "십"; n %= 10; }
      result += units[n];
      return result;
  }

  function init() {
      for (let key in bibleData) {
          let opt = document.createElement('option');
          opt.value = key;
          opt.innerText = bibleData[key].name;
          bookSelect.appendChild(opt);
      }
      updateChapters();
      const lastUrl = localStorage.getItem('last_bible_url');
      if (lastUrl) frame.src = lastUrl;
  }

  function updateChapters() {
      const book = bibleData[bookSelect.value];
      chapterSelect.innerHTML = "";
      for (let i = 1; i <= book.chapters; i++) {
          let opt = document.createElement('option');
          opt.value = i;
          opt.innerText = i + "장";
          chapterSelect.appendChild(opt);
      }
  }

  function loadBible() {
      const book = bibleData[bookSelect.value];
      const chapter = chapterSelect.value;
      const url = `https://syh8293.github.io/web/성경/${book.type}/${encodeURIComponent(book.folder)}/${bookSelect.value}%20${chapter}.html`;
      frame.src = url;
      localStorage.setItem('last_bible_url', url);
  }

  // 다음 장으로 자동 이동 로직
  function moveToNextAndPlay() {
      let currentChapter = parseInt(chapterSelect.value);
      const book = bibleData[bookSelect.value];

      if (currentChapter < book.chapters) {
          chapterSelect.value = currentChapter + 1;
          loadBible();
          // 페이지가 완전히 로딩된 후 낭독 시작 (1.5초 여유)
          setTimeout(() => speakBible(), 1500);
      } else {
          alert("해당 성경 권을 모두 읽었습니다!");
      }
  }

  function speakBible() {
      window.speechSynthesis.cancel();
      isPaused = false;

      const frameDoc = frame.contentWindow.document;
      const tempDiv = frameDoc.body.cloneNode(true);
      
      // 주석, 버튼 등 제거
      const junk = tempDiv.querySelectorAll('sup, a, script, style, button');
      junk.forEach(j => j.remove());

      let rawText = tempDiv.innerText;

      // 대장님의 요청: 절 번호 삭제 + 오미크론 삭제 + 장 발음 교정
      let cleanText = rawText
          .replace(/[\u039F\u03BF]/g, "") // 오미크론 제거
          .replace(/\d+:\d+/g, "")        // "1:1" 형태 낭독 생략
          .replace(/(\d+)\s*장/g, (m, p1) => toSinoKorean(p1) + " 장. ") 
          .replace(/[A-Z][+-]/g, "");

      const utterance = new SpeechSynthesisUtterance(cleanText);
      utterance.lang = 'ko-KR';
      utterance.rate = 0.85;

      // 낭독이 끝나면 자동으로 다음 장 실행
      utterance.onend = function() {
          if (!isPaused && autoNext) moveToNextAndPlay();
      };

      window.speechSynthesis.speak(utterance);
  }

  function stopBible() { 
      isPaused = true;
      window.speechSynthesis.cancel(); 
  }

  function pauseBible() {
      if (window.speechSynthesis.speaking && !window.speechSynthesis.paused) {
          window.speechSynthesis.pause();
      }
  }

  function resumeBible() {
      if (window.speechSynthesis.paused) {
          window.speechSynthesis.resume();
      }
  }

  let currentSize = 20;
  function changeFontSize(delta) {
      currentSize += delta;
      frame.contentWindow.document.body.style.fontSize = currentSize + "px";
  }

  init();
  </script>
