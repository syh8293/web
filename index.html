<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>한글 킹제임스 성경</title>
  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
    }

    /* 상단 고정 메뉴 */
    #app-header {
      height: 110px;
      background: #343a40;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
      z-index: 100;
    }

    .controls {
      display: flex;
      gap: 5px;
      margin-bottom: 10px;
    }

    select,
    button {
      padding: 8px;
      border-radius: 5px;
      border: none;
      font-size: 14px;
    }

    button {
      background: #495057;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .tts-controls {
      display: flex;
      gap: 10px;
    }

    .btn-main { background-color: #e74c3c; width:
    120px; font-size: 16px; } /* 유튜브 느낌의 빨간색 */
    .btn-stop { background-color: #7f8c8d; width:
    80px; }

    /* 성경 본문이 나오는 창 */
    #bible-frame {
      width: 100%;
      height: calc(100% - 110px);
      border: none;
    }
  </style>

  <style>
    /* 컨트롤러 전체 박스 */
    .tts-controls {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        padding: 10px;
        background: #34495e; /* 헤더보다 살짝 밝은 네이비 */
        border-radius: 12px;
        margin: 5px 10px;
    }

    /* 공통 버튼 스타일 */
    .tts-controls button {
        border: none;
        border-radius: 8px;
        padding: 12px 18px;
        font-size: 14px;
        font-weight: bold;
        color: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 5px;
        transition: transform 0.1s, background 0.2s;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .tts-controls button:active { transform: scale(0.95); }

    /* 버튼별 색상 정의 */
    .btn-start { background-color: #27ae60; } /* 녹색: 시작 */
    .btn-pause { background-color: #f39c12; } /* 주황: 일시정지 */
    .btn-resume { background-color: #2980b9; } /* 파랑: 계속하기 */
    .btn-stop { background-color: #c0392b; }  /* 빨강: 정지 */

    /* 현재 읽기 상태 표시창 */
    #status-display {
        width: 100%;
        text-align: center;
        font-size: 13px;
        color: #ecf0f1;
        margin-top: 5px;
        font-style: italic;
    }
  </style>

</head>

<body>

  <div id="app-header">
    <div class="controls">
      <select id="book-select"
        onchange="updateChapters()"></select>
      <select id="chapter-select"></select>
      <button onclick="loadBible()">바로가기</button>
    </div>

    <div class="tts-controls">
      <button id="main-play-btn" class="btn-main"
        onclick="togglePlay()">▶ 시작</button>
      <button class="btn-stop"
        onclick="stopBible()">■ 정지</button>

      <div id="status-display">말씀을 선택해 주세요</div>
    </div>
  </div>

  <iframe id="bible-frame"
    src="about:blank"></iframe>

// 2. [전역 변수] 앱 상태 관리
const bookSelect = document.getElementById('book-select');
const chapterSelect = document.getElementById('chapter-select');
const frame = document.getElementById('bible-frame');
const statusDisplay = document.getElementById('status-display');
const mainBtn = document.getElementById('main-play-btn');

let isPaused = false;
let autoNext = true;
let wakeLock = null;

// 3. [유틸리티] 한글 발음 및 화면 꺼짐 방지
function toSinoKorean(num) {
    const units = ["", "일", "이", "삼", "사", "오", "육", "칠", "팔", "구"];
    const tens = ["", "십", "백"]; 
    let n = parseInt(num);
    if (n === 0) return "영";
    let result = "";
    if (n >= 100) { result += (Math.floor(n / 100) === 1 ? "" : units[Math.floor(n / 100)]) + "백"; n %= 100; }
    if (n >= 10) { let d = Math.floor(n / 10); result += (d === 1 ? "" : units[d]) + "십"; n %= 10; }
    result += units[n];
    return result;
}

async function requestWakeLock() {
    try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); }
    catch (err) { console.log("WakeLock failed:", err); }
}

function releaseWakeLock() {
    if (wakeLock) { wakeLock.release(); wakeLock = null; }
}

// 4. [핵심 로직] 초기화 및 로딩
function init() {
    for (let key in bibleData) {
        let opt = document.createElement('option');
        opt.value = key;
        opt.innerText = bibleData[key].name;
        bookSelect.appendChild(opt);
    }
    updateChapters();
}

function updateChapters() {
    const book = bibleData[bookSelect.value];
    chapterSelect.innerHTML = "";
    for (let i = 1; i <= book.chapters; i++) {
        let opt = document.createElement('option');
        opt.value = i;
        opt.innerText = i + "장";
        chapterSelect.appendChild(opt);
    }
}

function loadBible() {
    const book = bibleData[bookSelect.value];
    const chapter = chapterSelect.value;
    const url = `https://syh8293.github.io/web/성경/${book.type}/${encodeURIComponent(book.folder)}/${bookSelect.value}%20${chapter}.html`;
    frame.src = url;
}

// 5. [낭독 엔진] 유튜브 스타일 재생/일시정지
function togglePlay() {
    if (!window.speechSynthesis.speaking) {
        speakBible();
        mainBtn.innerText = "⏸ 일시정지";
        requestWakeLock();
    } else if (window.speechSynthesis.paused) {
        window.speechSynthesis.resume();
        mainBtn.innerText = "⏸ 일시정지";
    } else {
        window.speechSynthesis.pause();
        mainBtn.innerText = "▶ 계속하기";
        releaseWakeLock();
    }
}

function speakBible() {
    window.speechSynthesis.cancel();
    isPaused = false;

    const book = bibleData[bookSelect.value];
    const chapter = chapterSelect.value;
    
    // 잠금 화면 메타데이터 설정
    if ('mediaSession' in navigator) {
        navigator.mediaSession.metadata = new MediaMetadata({
            title: `${book.name} ${chapter}장`,
            artist: '성경 통독 똑비',
            album: '킹제임스'
        });
    }

    const frameDoc = frame.contentWindow.document;
    const tempDiv = frameDoc.body.cloneNode(true);
    const junk = tempDiv.querySelectorAll('sup, a, script, style, button');
    junk.forEach(j => j.remove());

    let cleanText = tempDiv.innerText
        .replace(/[\u039F\u03BF]/g, "") // 오미크론 제거
        .replace(/\d+:\d+/g, "")        // 절 번호 생략
        .replace(/(\d+)\s*장/g, (m, p1) => toSinoKorean(p1) + " 장. ") // 장 발음 교정
        .replace(/[A-Z][+-]/g, "");

    const utterance = new SpeechSynthesisUtterance(cleanText);
    utterance.lang = 'ko-KR';
    utterance.rate = 0.85;

    utterance.onend = function() {
        if (!isPaused && autoNext) {
            moveToNextAndPlay();
        } else {
            stopBible();
        }
    };

    window.speechSynthesis.speak(utterance);
    statusDisplay.innerText = `🎙️ ${book.name} ${chapter}장 읽는 중...`;
    statusDisplay.style.color = "#2ecc71";
}

function moveToNextAndPlay() {
    let currentChapter = parseInt(chapterSelect.value);
    const book = bibleData[bookSelect.value];
    if (currentChapter < book.chapters) {
        chapterSelect.value = currentChapter + 1;
        loadBible();
        setTimeout(() => speakBible(), 1500); // 로딩 대기
    } else {
        alert("해당 권을 완독하셨습니다!");
        stopBible();
    }
}

function stopBible() {
    isPaused = true;
    window.speechSynthesis.cancel();
    releaseWakeLock();
    mainBtn.innerText = "▶ 시작";
    statusDisplay.innerText = "■ 낭독 정지";
    statusDisplay.style.color = "#e74c3c";
}

init();
  </script>
