  <style>
    /* 기본 설정: 화면 전체를 꽉 채우고 스크롤 방지 */
body {
    margin: 0;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    font-family: sans-serif;
    background-color: #2c3e50;
}

/* 1단: 헤더 (노치 대응 + 세로 쌓기) */
#app-header {
    padding-top: env(safe-area-inset-top, 20px); /* 아이폰 노치만큼 띄우기 */
    background-color: #2c3e50;
    color: white;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding-bottom: 10px;
    z-index: 100;
}

/* 성경 선택 줄 */
.selection-line {
    display: flex;
    justify-content: space-around;
    padding: 0 10px;
    gap: 5px;
}

.selection-line select {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    font-size: 15px;
}

.btn-go {
    background-color: #7f8c8d;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    font-weight: bold;
}

/* 2단: 재생 컨트롤 (유튜브 스타일) */
.tts-controls {
    display: flex;
    justify-content: center;
    gap: 15px;
    padding: 5px 10px;
}

.btn-main {
    background-color: #e74c3c;
    color: white;
    border: none;
    padding: 12px 25px;
    border-radius: 25px; /* 둥근 버튼 */
    font-size: 16px;
    font-weight: bold;
    flex: 1;
    max-width: 150px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.2);
}

.btn-stop {
    background-color: #555;
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 25px;
    font-size: 14px;
}

/* 상태 표시줄: 겹치지 않게 독립된 공간 확보 */
#status-display {
    background-color: #34495e;
    text-align: center;
    padding: 5px;
    font-size: 13px;
    color: #2ecc71;
    min-height: 20px;
}

/* 3단: 성경 본문 (나머지 공간 전부 차지) */
#bible-frame {
    flex: 1;
    width: 100%;
    border: none;
    background-color: white;
}

/* iframe 내부의 하이라이트 스타일 (자바스크립트로 주입하거나 iframe 로드시 적용) */
.highlight {
    background-color: yellow !important;
    color: black !important;
    font-weight: bold;
    border-radius: 4px;
    transition: background-color 0.2s;
}
  </style>

// 2. [전역 변수] 앱 상태 관리
const bookSelect = document.getElementById('book-select');
const chapterSelect = document.getElementById('chapter-select');

const statusDisplay = document.getElementById('status-display');

let isPaused = false;
let autoNext = true;
let wakeLock = null;

// 3. [유틸리티] 한글 발음 및 화면 꺼짐 방지
function toSinoKorean(num) {
    const units = ["", "일", "이", "삼", "사", "오", "육", "칠", "팔", "구"];
    const tens = ["", "십", "백"]; 
    let n = parseInt(num);
    if (n === 0) return "영";
    let result = "";
    if (n >= 100) { result += (Math.floor(n / 100) === 1 ? "" : units[Math.floor(n / 100)]) + "백"; n %= 100; }
    if (n >= 10) { let d = Math.floor(n / 10); result += (d === 1 ? "" : units[d]) + "십"; n %= 10; }
    result += units[n];
    return result;
}

async function requestWakeLock() {
    try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); }
    catch (err) { console.log("WakeLock failed:", err); }
}

function releaseWakeLock() {
    if (wakeLock) { wakeLock.release(); wakeLock = null; }
}

// 4. [핵심 로직] 초기화 및 로딩
function init() {
    for (let key in bibleData) {
        let opt = document.createElement('option');
        opt.value = key;
        opt.innerText = bibleData[key].name;
        bookSelect.appendChild(opt);
    }
    updateChapters();
}

function updateChapters() {
    const book = bibleData[bookSelect.value];
    chapterSelect.innerHTML = "";
    for (let i = 0; i <= book.chapters; i++) {
        let opt = document.createElement('option');
        opt.value = i;
        opt.innerText = i + "장";
        chapterSelect.appendChild(opt);
    }
}

function loadBible() {
    const book = bibleData[bookSelect.value];
    const chapter = chapterSelect.value;
    const url = `https://syh8293.github.io/web/성경/${book.type}/${encodeURIComponent(book.folder)}/${bookSelect.value}%20${chapter}.html`;
    frame.src = url;
}

// 5. [낭독 엔진] 유튜브 스타일 재생/일시정지
function togglePlay() {
    if (!window.speechSynthesis.speaking) {
        speakBible();
        mainBtn.innerText = "⏸ 일시정지";
        requestWakeLock();
    } else if (window.speechSynthesis.paused) {
        window.speechSynthesis.resume();
        mainBtn.innerText = "⏸ 일시정지";
    } else {
        window.speechSynthesis.pause();
        mainBtn.innerText = "▶ 계속하기";
        releaseWakeLock();
    }
}

function speakBible() {
    window.speechSynthesis.cancel();
    isPaused = false;

    const book = bibleData[bookSelect.value];
    const chapter = chapterSelect.value;
    const frameDoc = frame.contentWindow.document;

// 본문 텍스트를 추적 가능하게 준비하는 함수
function prepareHighlight(doc) {
    const body = doc.body;
    if (!doc.getElementById('tts-style')) {
        const style = doc.createElement('style');
        style.id = 'tts-style';
        style.innerHTML = `
            /* 절 전체를 감싸는 그릇에 하이라이트 적용 */
            .highlight-verse { 
                background-color: #FFF59D !important; 
                border-radius: 4px;
                transition: background-color 0.2s;
            }
            .verse-container { display: inline; }
            /* 번호는 노란색에서 제외하기 위한 설정 */
            .verse-num { background-color: transparent !important; font-weight: normal; }
        `;
        doc.head.appendChild(style);
    }
    if (body.querySelector('.verse-container')) return;

    // 절 번호를 기준으로 섹션을 나눕니다.
    const walker = doc.createTreeWalker(body, NodeFilter.SHOW_TEXT, null, false);
    let node;
    let globalIndex = 0;
    
    // 1. 먼저 모든 텍스트 노드에 인덱스 번호를 매깁니다.
    const nodes = [];
    while(node = walker.nextNode()) nodes.push(node);

    nodes.forEach(node => {
        const parent = node.parentNode;
        // header나 h5 안에 있는 텍스트는 인덱스 계산에서 제외 (TTS가 안 읽으니까요)
        if (['header', 'h5'].includes(parent.tagName.toLowerCase())) return;

        const text = node.nodeValue;
        const match = text.match(/^(\s*\d+:\d*\s*)(.*)/);

        if (match) {
            // 새로운 절 시작: 큰 그릇(span)을 만듭니다.
            const container = doc.createElement('span');
            container.className = 'verse-container';
            container.dataset.start = globalIndex;
            
            // 절 번호 부분 (노란색 안 칠함)
            const numSpan = doc.createElement('span');
            numSpan.className = 'verse-num';
            numSpan.textContent = match[1];
            
            // 본문 내용 부분
            const contentText = doc.createTextNode(match[2]);
            
            container.appendChild(numSpan);
            container.appendChild(contentText);
            
            // 원래 노드 자리에 그릇을 통째로 넣습니다.
            node.parentNode.replaceChild(container, node);
            
            // 본문 텍스트가 시작되는 지점부터 끝나는 지점까지 업데이트
            globalIndex += match[2].length;
            container.dataset.end = globalIndex;
        } else {
            // 이미 그릇(container) 안에 들어있는 b, a, sup 태그 안의 텍스트들 처리
            let p = node.parentNode;
            let container = null;
            while(p && p !== body) {
                if(p.classList.contains('verse-container')) { container = p; break; }
                p = p.parentNode;
            }
            if(container) {
                globalIndex += text.length;
                container.dataset.end = globalIndex;
            }
        }
    });
}

// 읽고 있는 단어에 형광펜 칠하고 스크롤하는 함수
function highlightWord(doc, charIndex) {
    const containers = doc.querySelectorAll('.verse-container');
    let activeContainer = null;

    for (let c of containers) {
        const start = parseInt(c.dataset.start);
        const end = parseInt(c.dataset.end);
        if (charIndex >= start && charIndex <= end) {
            activeContainer = c;
            break;
        }
    }

    if (activeContainer && !activeContainer.classList.contains('highlight-verse')) {
        doc.querySelectorAll('.highlight-verse').forEach(el => el.classList.remove('highlight-verse'));
        activeContainer.classList.add('highlight-verse');
        activeContainer.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
}

function moveToNextAndPlay() {
    let currentChapter = parseInt(chapterSelect.value);
    const book = bibleData[bookSelect.value];
    if (currentChapter < book.chapters) {
        chapterSelect.value = currentChapter + 1;
        loadBible();
        setTimeout(() => speakBible(), 1500); // 로딩 대기
    } else {
        alert("해당 권을 완독하셨습니다!");
        stopBible();
    }
}

function stopBible() {
    isPaused = true;
    window.speechSynthesis.cancel();
    releaseWakeLock();
    mainBtn.innerText = "▶ 시작";
    statusDisplay.innerText = "■ 낭독 정지";
    statusDisplay.style.color = "#e74c3c";
}

init();
