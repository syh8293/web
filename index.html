  <style>
    /* 기본 설정: 화면 전체를 꽉 채우고 스크롤 방지 */
body {
    margin: 0;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    font-family: sans-serif;
    background-color: #2c3e50;
}

/* 1단: 헤더 (노치 대응 + 세로 쌓기) */
#app-header {
    padding-top: env(safe-area-inset-top, 20px); /* 아이폰 노치만큼 띄우기 */
    background-color: #2c3e50;
    color: white;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding-bottom: 10px;
    z-index: 100;
}

/* 성경 선택 줄 */
.selection-line {
    display: flex;
    justify-content: space-around;
    padding: 0 10px;
    gap: 5px;
}

.selection-line select {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    font-size: 15px;
}

.btn-go {
    background-color: #7f8c8d;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    font-weight: bold;
}

/* 2단: 재생 컨트롤 (유튜브 스타일) */
.tts-controls {
    display: flex;
    justify-content: center;
    gap: 15px;
    padding: 5px 10px;
}

.btn-main {
    background-color: #e74c3c;
    color: white;
    border: none;
    padding: 12px 25px;
    border-radius: 25px; /* 둥근 버튼 */
    font-size: 16px;
    font-weight: bold;
    flex: 1;
    max-width: 150px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.2);
}

.btn-stop {
    background-color: #555;
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 25px;
    font-size: 14px;
}

/* 상태 표시줄: 겹치지 않게 독립된 공간 확보 */
#status-display {
    background-color: #34495e;
    text-align: center;
    padding: 5px;
    font-size: 13px;
    color: #2ecc71;
    min-height: 20px;
}

/* 3단: 성경 본문 (나머지 공간 전부 차지) */
#bible-frame {
    flex: 1;
    width: 100%;
    border: none;
    background-color: white;
}

/* iframe 내부의 하이라이트 스타일 (자바스크립트로 주입하거나 iframe 로드시 적용) */
.highlight {
    background-color: yellow !important;
    color: black !important;
    font-weight: bold;
    border-radius: 4px;
    transition: background-color 0.2s;
}
  </style>

// 2. [전역 변수] 앱 상태 관리
const bookSelect = document.getElementById('book-select');
const chapterSelect = document.getElementById('chapter-select');
const frame = document.getElementById('bible-frame');
const statusDisplay = document.getElementById('status-display');
const mainBtn = document.getElementById('main-play-btn');

let isPaused = false;
let autoNext = true;
let wakeLock = null;

// 3. [유틸리티] 한글 발음 및 화면 꺼짐 방지
function toSinoKorean(num) {
    const units = ["", "일", "이", "삼", "사", "오", "육", "칠", "팔", "구"];
    const tens = ["", "십", "백"]; 
    let n = parseInt(num);
    if (n === 0) return "영";
    let result = "";
    if (n >= 100) { result += (Math.floor(n / 100) === 1 ? "" : units[Math.floor(n / 100)]) + "백"; n %= 100; }
    if (n >= 10) { let d = Math.floor(n / 10); result += (d === 1 ? "" : units[d]) + "십"; n %= 10; }
    result += units[n];
    return result;
}

async function requestWakeLock() {
    try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); }
    catch (err) { console.log("WakeLock failed:", err); }
}

function releaseWakeLock() {
    if (wakeLock) { wakeLock.release(); wakeLock = null; }
}

// 4. [핵심 로직] 초기화 및 로딩
function init() {
    for (let key in bibleData) {
        let opt = document.createElement('option');
        opt.value = key;
        opt.innerText = bibleData[key].name;
        bookSelect.appendChild(opt);
    }
    updateChapters();
}

function updateChapters() {
    const book = bibleData[bookSelect.value];
    chapterSelect.innerHTML = "";
    for (let i = 0; i <= book.chapters; i++) {
        let opt = document.createElement('option');
        opt.value = i;
        opt.innerText = i + "장";
        chapterSelect.appendChild(opt);
    }
}

function loadBible() {
    const book = bibleData[bookSelect.value];
    const chapter = chapterSelect.value;
    const url = `https://syh8293.github.io/web/성경/${book.type}/${encodeURIComponent(book.folder)}/${bookSelect.value}%20${chapter}.html`;
    frame.src = url;
}

// 5. [낭독 엔진] 유튜브 스타일 재생/일시정지
function togglePlay() {
    if (!window.speechSynthesis.speaking) {
        speakBible();
        mainBtn.innerText = "⏸ 일시정지";
        requestWakeLock();
    } else if (window.speechSynthesis.paused) {
        window.speechSynthesis.resume();
        mainBtn.innerText = "⏸ 일시정지";
    } else {
        window.speechSynthesis.pause();
        mainBtn.innerText = "▶ 계속하기";
        releaseWakeLock();
    }
}

function speakBible() {
    window.speechSynthesis.cancel();
    isPaused = false;

    const book = bibleData[bookSelect.value];
    const chapter = chapterSelect.value;
    const frameDoc = frame.contentWindow.document;

    // 1. [하이라이트 준비] 본문의 글자들을 단어 단위로 쪼개어 감쌉니다.
    // 기존 텍스트를 건드리지 않고 추적하기 위해 단어마다 <span>태그를 입히는 과정입니다.
    prepareHighlight(frameDoc);

    const tempDiv = frameDoc.body.cloneNode(true);
    const junk = tempDiv.querySelectorAll('sup, a, script, style, button');
    junk.forEach(j => j.remove());

    // 2. [자연스러운 호흡] 문장 부호 뒤에 미세한 쉼표 추가
    let cleanText = tempDiv.innerText
        .replace(/[\u039F\u03BF]/g, "") 
        .replace(/\d+:\d+/g, "")        
        .replace(/\. /g, ".  ") // 마침표 뒤에 공백 추가로 호흡 조절
        .replace(/, /g, ",  ")  // 쉼표 뒤에 공백 추가
        .replace(/(\d+)\s*장/g, (m, p1) => toSinoKorean(p1) + " 장. ") 
        .replace(/[A-Z][+-]/g, "");

    const utterance = new SpeechSynthesisUtterance(cleanText);
    utterance.lang = 'ko-KR';
    utterance.rate = 0.85;

    // 3. [고품질 목소리 선택] 시스템에서 가장 좋은 목소리 자동 매칭
    const voices = window.speechSynthesis.getVoices();
    const premiumVoice = voices.find(v => v.name.includes('Google') && v.lang === 'ko-KR') || voices.find(v => v.lang === 'ko-KR');
    if (premiumVoice) utterance.voice = premiumVoice;

    // 4. [하이라이트 & 자동 스크롤 핵심 로직]
    utterance.onboundary = function(event) {
        if (event.name === 'word') {
            const charIndex = event.charIndex;
            highlightWord(frameDoc, charIndex);
        }
    };

    utterance.onend = function() {
        if (!isPaused && autoNext) moveToNextAndPlay();
        else stopBible();
    };

    window.speechSynthesis.speak(utterance);
    statusDisplay.innerText = `🎙️ ${book.name} ${chapter}장 읽는 중...`;
}

// 본문 텍스트를 추적 가능하게 준비하는 함수
function prepareHighlight(doc) {
    const body = doc.body;
    
    if (!doc.getElementById('tts-style')) {
        const style = doc.createElement('style');
        style.id = 'tts-style';
        style.innerHTML = `
            .highlight {
                background-color: yellow !important;
                color: black !important;
                font-weight: bold;
                font-size: 1.15em; /* 강조를 위해 조금 더 키움 */
                border-radius: 4px;
                display: inline !important;
            }
            .tts-word { display: inline !important; }
        `;
        doc.head.appendChild(style);
    }

    if (body.querySelector('.tts-word')) return;

    // [중요] 읽지 않을 태그들: header, h5, sup, a, button 등
    const ignoreTags = ['header', 'h5', 'sup', 'a', 'button', 'style', 'script'];

    const walker = doc.createTreeWalker(body, NodeFilter.SHOW_TEXT, {
        acceptNode: function(node) {
            let parent = node.parentNode;
            while (parent && parent !== body) {
                if (ignoreTags.includes(parent.tagName.toLowerCase())) {
                    return NodeFilter.FILTER_REJECT;
                }
                parent = parent.parentNode;
            }
            // 숫자만 있는 노드(절 번호 등) 거르기
            if (/^\d+[:]?\d*$/.test(node.nodeValue.trim())) return NodeFilter.FILTER_REJECT;
            return NodeFilter.FILTER_ACCEPT;
        }
    }, false);

    let node;
    const textNodes = [];
    while (node = walker.nextNode()) textNodes.push(node);

    textNodes.forEach(node => {
        const text = node.nodeValue;
        const fragment = doc.createDocumentFragment();
        const words = text.split(/(\s+)/); 
        
        words.forEach(word => {
            if (word.trim().length > 0) {
                const span = doc.createElement('span');
                span.className = 'tts-word';
                // 나중에 찾기 쉽게 글자 위치 정보를 데이터로 살짝 저장합니다.
                span.textContent = word;
                fragment.appendChild(span);
            } else {
                fragment.appendChild(doc.createTextNode(word));
            }
        });
        node.parentNode.replaceChild(fragment, node);
    });
}

// 읽고 있는 단어에 형광펜 칠하고 스크롤하는 함수
function highlightWord(doc, charIndex) {
    const allWords = doc.querySelectorAll('.tts-word');
    if (allWords.length === 0) return;

    let currentPos = 0;
    let targetElement = null;

    // 모든 단어를 돌며 TTS가 알려준 charIndex 위치에 있는 단어를 찾습니다.
    for (let word of allWords) {
        let len = word.textContent.length;
        if (charIndex >= currentPos && charIndex < currentPos + len + 1) {
            targetElement = word;
            break;
        }
        currentPos += len + 1; // 단어 길이 + 공백(1)
    }

    if (targetElement && !targetElement.classList.contains('highlight')) {
        doc.querySelectorAll('.highlight').forEach(el => el.classList.remove('highlight'));
        targetElement.classList.add('highlight');
        
        // 자동 스크롤
        targetElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
}

function moveToNextAndPlay() {
    let currentChapter = parseInt(chapterSelect.value);
    const book = bibleData[bookSelect.value];
    if (currentChapter < book.chapters) {
        chapterSelect.value = currentChapter + 1;
        loadBible();
        setTimeout(() => speakBible(), 1500); // 로딩 대기
    } else {
        alert("해당 권을 완독하셨습니다!");
        stopBible();
    }
}

function stopBible() {
    isPaused = true;
    window.speechSynthesis.cancel();
    releaseWakeLock();
    mainBtn.innerText = "▶ 시작";
    statusDisplay.innerText = "■ 낭독 정지";
    statusDisplay.style.color = "#e74c3c";
}

init();
  </script>
